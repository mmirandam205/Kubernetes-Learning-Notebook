<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9ede;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#326ce5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
  </g>

  <!-- Kubernetes Wheel (left side) -->
  <g transform="translate(100, 100)">
    <!-- Outer ring -->
    <circle r="62" fill="none" stroke="url(#wheelGrad)" stroke-width="6"/>
    <!-- Inner hub -->
    <circle r="14" fill="url(#wheelGrad)"/>
    <!-- 7 spokes -->
    <g stroke="url(#wheelGrad)" stroke-width="5" stroke-linecap="round">
      <line x1="0" y1="-14" x2="0" y2="-48"/>
      <line x1="13.3" y1="-4.8" x2="45.5" y2="-16.6"/>
      <line x1="13.3" y1="4.8" x2="45.5" y2="16.6"/>
      <line x1="0" y1="14" x2="0" y2="48"/>
      <line x1="-13.3" y1="4.8" x2="-45.5" y2="16.6"/>
      <line x1="-13.3" y1="-4.8" x2="-45.5" y2="-16.6"/>
      <line x1="14" y1="0" x2="48" y2="0"/>
    </g>
    <!-- 7 pods at spoke ends -->
    <circle cx="0" cy="-56" r="7" fill="url(#wheelGrad)"/>
    <circle cx="53" cy="-19.4" r="7" fill="url(#wheelGrad)"/>
    <circle cx="53" cy="19.4" r="7" fill="url(#wheelGrad)"/>
    <circle cx="0" cy="56" r="7" fill="url(#wheelGrad)"/>
    <circle cx="-53" cy="19.4" r="7" fill="url(#wheelGrad)"/>
    <circle cx="-53" cy="-19.4" r="7" fill="url(#wheelGrad)"/>
    <circle cx="56" cy="0" r="7" fill="url(#wheelGrad)"/>
  </g>

  <!-- Title text -->
  <text x="200" y="85" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Kubernetes</text>
  <text x="200" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#326ce5" letter-spacing="-0.5">Learning Notebook</text>

  <!-- Subtitle -->
  <text x="201" y="158" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#7aadda" letter-spacing="0.3">From fundamentals to production-ready Kubernetes — 13 structured modules</text>

  <!-- Right-side decorative dots (node cluster visual) -->
  <g fill="#326ce5" opacity="0.35">
    <circle cx="810" cy="40" r="4"/>
    <circle cx="840" cy="55" r="3"/>
    <circle cx="870" cy="40" r="5"/>
    <circle cx="855" cy="70" r="3"/>
    <circle cx="825" cy="75" r="4"/>
  </g>
  <g stroke="#326ce5" stroke-width="1" opacity="0.25">
    <line x1="810" y1="40" x2="840" y2="55"/>
    <line x1="840" y1="55" x2="870" y2="40"/>
    <line x1="840" y1="55" x2="855" y2="70"/>
    <line x1="825" y1="75" x2="840" y2="55"/>
    <line x1="825" y1="75" x2="855" y2="70"/>
    <line x1="810" y1="40" x2="825" y2="75"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="193" width="900" height="7" fill="url(#wheelGrad)" rx="0"/>
</svg>